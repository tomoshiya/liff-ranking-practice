<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RankQuest β — 結果発表 v5</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Sans:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F4F0;--surface:#fff;--surface-2:#ECEAE4;--border:#E0DDD5;--text-primary:#18171A;--text-secondary:#6B6860;--text-muted:#A8A49C;--hero:#1E1C2E}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#DDDBD4;display:flex;justify-content:center;min-height:100vh;padding:28px 16px 48px;font-family:'Noto Sans JP',sans-serif}
.phone{width:390px;background:var(--bg);border-radius:44px;overflow:hidden;box-shadow:0 40px 80px rgba(0,0,0,0.22),0 0 0 1px rgba(0,0,0,0.06);display:flex;flex-direction:column}
.status-bar{background:var(--hero);padding:14px 28px 8px;display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:rgba(255,255,255,0.5)}

/* HERO */
.hero{background:var(--hero);padding:6px 20px 24px;position:relative;overflow:hidden}
.hb{position:absolute;border-radius:50%;background:rgba(255,255,255,0.04);pointer-events:none}
.hb.b1{width:220px;height:220px;top:-80px;right:-60px}
.hb.b2{width:130px;height:130px;bottom:-50px;left:-10px}
.hero-nav{display:flex;align-items:baseline;gap:7px;margin-bottom:16px}
.hero-nav-title{font-size:16px;font-weight:900;color:#fff;letter-spacing:-0.02em}
.hero-nav-sub{font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.hero-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:22px}
.theme-card{position:relative;width:156px;height:88px;border-radius:10px;overflow:hidden;flex-shrink:0;background:#2C3E50;box-shadow:0 6px 20px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.08)}
.theme-card .wa{position:absolute;inset:0;background:#fff;clip-path:polygon(50px 0%,100% 0%,100% 100%,33px 100%)}
.theme-card .pl{position:absolute;bottom:0;left:0;width:38px;top:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;z-index:10}
.theme-card .pl span{writing-mode:vertical-rl;transform:rotate(180deg);font-size:6px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.45)}
.theme-card .tt{position:absolute;top:50%;right:0;width:calc(100% - 44px);transform:translateY(-50%);padding:0 9px 0 4px;font-size:10.5px;font-weight:700;color:#1A1917;line-height:1.45;letter-spacing:-0.01em;z-index:10}
.hero-meta{flex:1;padding-top:4px;display:flex;flex-direction:column;gap:10px}
.meta-row{display:flex;flex-direction:column;gap:1px}
.meta-label{font-size:9px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.3)}
.meta-value{font-size:15px;font-weight:900;color:#fff;letter-spacing:-0.02em}

/* ランキング種別タブ */
.rank-type-tabs{display:flex;gap:5px;margin-bottom:12px;overflow-x:auto}
.rank-type-tabs::-webkit-scrollbar{display:none}
.rttab{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1.5px solid rgba(255,255,255,0.15);background:transparent;font-size:11px;font-weight:700;color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.15s;font-family:'Noto Sans JP',sans-serif;white-space:nowrap}
.rttab.active{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);color:#fff}
.ranking-label{font-size:10px;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:9px}
.rank-rows{display:flex;flex-direction:column;gap:5px}
.rank-row{display:flex;align-items:center;gap:8px;opacity:0;transform:translateY(10px);animation:su 0.4s cubic-bezier(0.34,1.3,0.64,1) forwards}
@keyframes su{to{opacity:1;transform:translateY(0)}}
.rbadge{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:900;font-style:italic;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.4)}
.rbadge.gold{background:#F59E0B;color:#fff;box-shadow:0 0 0 2px rgba(245,158,11,0.3)}
.rbadge.silver{background:rgba(255,255,255,0.2);color:#fff}
.rbadge.bronze{background:rgba(180,100,30,0.45);color:#fff}
.rplayer{flex:1;min-width:0}
.rname{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rname.top{font-size:14px}
.rsub{font-size:9px;color:rgba(255,255,255,0.3);font-weight:600;margin-top:1px;white-space:nowrap}
.rscore{font-family:'DM Sans',sans-serif;font-size:14px;font-weight:900;font-style:italic;color:rgba(255,255,255,0.5);flex-shrink:0}
.rscore.top{font-size:20px;color:#F59E0B}

/* SCROLL */
.scroll-content{flex:1;overflow-y:auto;padding:16px 0 120px;-webkit-overflow-scrolling:touch}
.scroll-content::-webkit-scrollbar{display:none}
.legend{display:flex;gap:12px;padding:0 20px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-secondary);font-weight:600}
.ldot{width:7px;height:7px;border-radius:50%}
.ldot.hit{background:#10B981}.ldot.close{background:#F59E0B}.ldot.miss{background:#D1D5DB}
.sec-head{padding:0 20px;margin-bottom:10px}
.sec-title{font-size:13px;font-weight:800;color:var(--text-primary);letter-spacing:-0.01em;margin-bottom:2px}
.sec-desc{font-size:11px;color:var(--text-muted);line-height:1.5}

/* 人物タブ */
.player-tabs{display:flex;gap:5px;overflow-x:auto;padding:0 20px 2px;margin-bottom:12px}
.player-tabs::-webkit-scrollbar{display:none}
.ptab{flex-shrink:0;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);font-size:11px;font-weight:700;color:var(--text-secondary);cursor:pointer;transition:all 0.15s}
.ptab.active{background:var(--text-primary);border-color:var(--text-primary);color:#fff}

/* 軸切替 */
.axis-tabs{display:flex;margin:0 20px 14px;background:var(--surface-2);border-radius:10px;padding:3px;gap:2px}
.atab{flex:1;padding:8px 4px;border:none;border-radius:7px;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all 0.15s;color:var(--text-muted);background:transparent;text-align:center;line-height:1.3}
.atab .asub{font-size:9px;font-weight:600;opacity:0.7;display:block;margin-top:1px}
.atab.active{background:var(--surface);color:var(--text-primary);box-shadow:0 1px 4px rgba(0,0,0,0.08)}

/* スコアサマリー */
.score-box{margin:0 20px 4px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.score-box-head{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);padding:9px 12px 7px;border-bottom:1px solid var(--border)}
.score-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;gap:10px}
.score-row:last-child{border-bottom:none}
.score-row:hover{background:var(--surface-2)}
.score-row.active-row{background:#18171A}
.score-row-name{font-size:12px;font-weight:700;color:var(--text-primary);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score-row.active-row .score-row-name{color:#fff}
.score-row-pt{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:900;font-style:italic;color:var(--text-primary);flex-shrink:0}
.score-row.active-row .score-row-pt{color:#F59E0B}
.score-row-chevron{font-size:9px;color:var(--text-muted);flex-shrink:0}
.score-row.active-row .score-row-chevron{color:rgba(255,255,255,0.4)}
.score-total-row{display:flex;align-items:center;padding:9px 12px;background:var(--surface-2);gap:10px;border-top:1.5px solid var(--border)}
.score-total-label{font-size:11px;font-weight:800;color:var(--text-secondary);flex:1}
.score-total-pt{font-family:'DM Sans',sans-serif;font-size:17px;font-weight:900;font-style:italic;color:var(--text-primary)}

/* 詳細パネル */
.detail-wrap{padding:0 20px;margin-bottom:4px}
.detail-panel{display:none}
.detail-panel.active{display:block}
.detail-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px;border-bottom:2px solid var(--text-primary);margin-bottom:2px}
.detail-who{font-size:11px;font-weight:800;color:var(--text-muted);letter-spacing:0.03em;line-height:1.5}
.detail-who span{font-size:10px;font-weight:600;color:var(--text-muted)}
.detail-total{font-family:'DM Sans',sans-serif;font-size:22px;font-weight:900;font-style:italic;color:var(--text-primary)}

/* ランク行（アコーディオン）- 正解した率 */
.ri{border-bottom:1px solid var(--border)}
.ri-head{display:flex;align-items:center;gap:7px;padding:9px 0;cursor:pointer}
.ri-num{width:28px;flex-shrink:0;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:900;font-style:italic;color:var(--text-muted);text-align:center;line-height:1.2}
.ri-ans{flex:1;font-size:12px;font-weight:700;color:var(--text-primary);line-height:1.4;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ri.open .ri-ans{white-space:normal}

/* 自分の評価チップ（▼の横、他者と同形式） */
.ri-mine-wrap{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ri-mine-rank{font-size:9px;font-weight:700;color:var(--text-muted);white-space:nowrap}
.ri-chip{flex-shrink:0;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700;white-space:nowrap}
.ri-chip.hit{background:#D1FAE5;color:#065F46}
.ri-chip.close{background:#FEF3C7;color:#92400E}
.ri-chip.miss{background:var(--surface-2);color:var(--text-muted)}
.ri-pt{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:900;font-style:italic;color:var(--text-primary);flex-shrink:0;min-width:20px;text-align:right}
.ri-chv{font-size:8px;color:var(--text-muted);transition:transform 0.2s;flex-shrink:0;margin-left:3px}
.ri.open .ri-chv{transform:rotate(180deg)}
.ri-body{display:none;padding:0 0 8px 35px}
.ri.open .ri-body{display:block}

/* 展開時の他者行（正解した率）*/
.gr{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)}
.gr:last-child{border-bottom:none}
.gr-name{width:40px;flex-shrink:0;font-size:10px;font-weight:700;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gr-rank{font-size:9px;font-weight:700;color:var(--text-muted);white-space:nowrap;flex-shrink:0}
.gr-chip{flex-shrink:0;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:700;white-space:nowrap}
.gr-chip.hit{background:#D1FAE5;color:#065F46}
.gr-chip.close{background:#FEF3C7;color:#92400E}
.gr-chip.miss{background:var(--surface-2);color:var(--text-muted)}
.gr-pt{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:900;font-style:italic;color:var(--text-primary);flex-shrink:0;min-width:20px;text-align:right}

/* 合計行 */
.detail-total-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-top:1.5px solid var(--text-primary);cursor:pointer;margin-top:2px}
.detail-total-label{font-size:11px;font-weight:800;color:var(--text-secondary);flex:1}
.detail-total-score{font-family:'DM Sans',sans-serif;font-size:18px;font-weight:900;font-style:italic;color:var(--text-primary)}
.detail-total-chv{font-size:8px;color:var(--text-muted);transition:transform 0.2s;flex-shrink:0}
.detail-total-row.open .detail-total-chv{transform:rotate(180deg)}
.detail-total-body{display:none;padding:6px 0 4px}
.cmp-row{display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border)}
.cmp-row:last-child{border-bottom:none}
.cmp-name{font-size:11px;font-weight:700;color:var(--text-secondary);flex:1}
.cmp-bar-wrap{flex:1;height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;max-width:70px}
.cmp-bar{height:100%;border-radius:2px;background:var(--text-primary)}
.cmp-pt{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:900;font-style:italic;color:var(--text-primary);min-width:32px;text-align:right}

/* 正解され率の詳細（▼なし） */
.sare-ri{display:flex;align-items:center;gap:7px;padding:9px 0;border-bottom:1px solid var(--border)}
.sare-ri:last-child{border-bottom:none}
.sare-num{width:28px;flex-shrink:0;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:900;font-style:italic;color:var(--text-muted);text-align:center;line-height:1.2}
.sare-wrap{flex:1;min-width:0}
.sare-guess{font-size:12px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sare-correct{font-size:10px;color:var(--text-muted);margin-top:1px}
.sare-chip{flex-shrink:0;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:700;white-space:nowrap}
.sare-chip.hit{background:#D1FAE5;color:#065F46}
.sare-chip.close{background:#FEF3C7;color:#92400E}
.sare-chip.miss{background:var(--surface-2);color:var(--text-muted)}
.sare-pt{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:900;font-style:italic;color:var(--text-primary);flex-shrink:0;min-width:20px;text-align:right}

/* アフタートーク */
.drill{margin:16px 20px 0;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.drill-label{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);padding:10px 14px 8px;border-bottom:1px solid var(--border)}
.drill-item{display:flex;align-items:flex-start;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-secondary);line-height:1.55}
.drill-item:last-child{border-bottom:none}
.di-icon{font-size:13px;flex-shrink:0;margin-top:1px}

.divider{height:1px;background:var(--border);margin:20px 0}
.replay{margin:0 20px;display:flex;flex-direction:column;gap:10px}
.btn-p{width:100%;padding:15px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:#18171A;color:#fff;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.btn-s{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;background:var(--surface);color:var(--text-secondary);cursor:pointer}
.replay-note{text-align:center;font-size:11px;color:var(--text-muted);line-height:1.5}
</style>
</head>
<body>
<div class="phone">
<div class="status-bar"><span>9:41</span><div style="display:flex;gap:5px">📶🔋</div></div>

<div class="hero">
  <div class="hb b1"></div><div class="hb b2"></div>
  <div class="hero-nav">
    <span class="hero-nav-title">結果発表</span>
    <span class="hero-nav-sub">Result</span>
  </div>
  <div class="hero-top">
    <div class="theme-card">
      <div class="wa"></div><div class="pl"><span>Basic</span></div>
      <div class="tt">この1年で買ってよかったものTOP5</div>
    </div>
    <div class="hero-meta">
      <div class="meta-row"><div class="meta-label">参加人数</div><div class="meta-value">8人</div></div>
      <div class="meta-row"><div class="meta-label">最大pt</div><div class="meta-value">70pt</div></div>
    </div>
  </div>
  <div class="rank-type-tabs">
    <div class="rttab active" onclick="switchRankType('total',this)">総合</div>
    <div class="rttab" onclick="switchRankType('shita',this)">正解した率</div>
    <div class="rttab" onclick="switchRankType('sare',this)">正解され率</div>
    <div class="rttab" onclick="switchRankType('zure',this)">ズレ幅</div>
  </div>
  <div class="ranking-label" id="rankingLabel">総合ランキング</div>
  <div class="rank-rows" id="rankRows"></div>
</div>

<div class="scroll-content">
  <div class="legend">
    <div class="legend-item"><div class="ldot hit"></div>正解 +2pt</div>
    <div class="legend-item"><div class="ldot close"></div>おしい(±1) +1pt</div>
    <div class="legend-item"><div class="ldot miss"></div>はずれ</div>
  </div>
  <div class="sec-head">
    <div class="sec-title">個人詳細</div>
    <div class="sec-desc">人物タブで切替 → 行をタップで他の人の予想を展開</div>
  </div>
  <div class="player-tabs" id="playerTabs"></div>
  <div class="axis-tabs">
    <button class="atab active" onclick="switchAxis('shita',this)">正解した率<span class="asub">自分が他の人を当てた？</span></button>
    <button class="atab" onclick="switchAxis('sare',this)">正解され率<span class="asub">自分は他の人に当てられた？</span></button>
  </div>
  <div id="summary-shita">
    <div class="score-box">
      <div class="score-box-head" id="shita-head"></div>
      <div id="shita-rows"></div>
      <div class="score-total-row"><div class="score-total-label">合計</div><div class="score-total-pt" id="shita-total"></div></div>
    </div>
  </div>
  <div id="summary-sare" style="display:none">
    <div class="score-box">
      <div class="score-box-head" id="sare-head"></div>
      <div id="sare-rows"></div>
      <div class="score-total-row"><div class="score-total-label">合計</div><div class="score-total-pt" id="sare-total"></div></div>
    </div>
  </div>
  <div class="detail-wrap">
    <div id="detail-shita" class="detail-panel active"></div>
    <div id="detail-sare" class="detail-panel"></div>
  </div>

  <div class="drill">
    <div class="drill-label">💬 アフタートーク</div>
    <div class="drill-item"><div class="di-icon">🎯</div><div>はなこだけがけんじの1stを完璧に予想。なぜわかった？</div></div>
    <div class="drill-item"><div class="di-icon">😲</div><div>けんじのズレ幅が最大。まわりへの理解は高いのに、自分のことは見せていない？</div></div>
    <div class="drill-item"><div class="di-icon">🏆</div><div>けんじはさくらのランキングをほぼ全問正解。ふたりの間に何がある？</div></div>
  </div>
  <div class="divider"></div>
  <div class="replay">
    <button class="btn-p">🔄 もう一回同じテーマで</button>
    <button class="btn-s">🎲 テーマを変えて遊ぶ</button>
    <div class="replay-note">結果のシェア機能はβ版以降に実装予定</div>
  </div>
</div>
</div>

<script>
// 順位を英語表記に変換
function ordinal(n){return n===1?'1st':n===2?'2nd':n===3?'3rd':`${n}th`}

const PLAYERS=[
  {id:'kenji', name:'けんじ', score:58,shita:32,sare:26},
  {id:'hanako',name:'はなこ', score:52,shita:28,sare:24},
  {id:'sakura',name:'さくら', score:49,shita:26,sare:23},
  {id:'taro',  name:'たろう', score:44,shita:22,sare:22},
  {id:'yuki',  name:'ゆき',   score:40,shita:20,sare:20},
  {id:'riku',  name:'りく',   score:35,shita:18,sare:17},
  {id:'mina',  name:'みな',   score:29,shita:14,sare:15},
  {id:'daiki', name:'だいき', score:21,shita:10,sare:11},
];

const ANSWERS={
  kenji: ['スタンディングデスク','コーヒーミル','Kindle Paperwhite','ワイヤレスイヤホン','ヨガマット'],
  hanako:['マッサージガン','アロマディフューザー','電動歯ブラシ','加湿器','シルクのまくらカバー'],
  sakura:['ホットクック','バルミューダのトースター','コードレス掃除機','ハンドブレンダー','電気圧力鍋'],
  taro:  ['メカニカルキーボード','ゲーミングチェア','外付けモニター','ヘッドセット','マウスパッド'],
  yuki:  ['ランニングシューズ','プロテインシェイカー','ストレッチポール','スポーツサングラス','トレーニンググローブ'],

// ===== State =====
let currentPlayer='kenji', currentAxis='shita', selectedTarget=null, rankType='total';

// ===== ランキング描画 =====
function renderRanking(){
  const labels={total:'総合ランキング',shita:'正解した率ランキング',sare:'正解され率ランキング',zure:'ズレ幅ランキング'};
  document.getElementById('rankingLabel').textContent=labels[rankType];
  let sorted;
  if(rankType==='total')     sorted=[...PLAYERS].sort((a,b)=>b.score-a.score);
  else if(rankType==='shita')sorted=[...PLAYERS].sort((a,b)=>b.shita-a.shita);
  else if(rankType==='sare') sorted=[...PLAYERS].sort((a,b)=>b.sare-a.sare);
  else                       sorted=[...PLAYERS].sort((a,b)=>Math.abs(b.shita-b.sare)-Math.abs(a.shita-a.sare));
  const rows=document.getElementById('rankRows');
  rows.innerHTML='';
  sorted.forEach((p,i)=>{
    const rank=i+1;
    const badge=rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
    const isTop=rank===1;
    let scoreVal,subText;
    if(rankType==='total'){     scoreVal=p.score+'pt'; subText=`した率 ${p.shita}pt · され率 ${p.sare}pt`;}
    else if(rankType==='shita'){scoreVal=p.shita+'pt'; subText=`総合 ${p.score}pt`;}
    else if(rankType==='sare'){ scoreVal=p.sare+'pt';  subText=`総合 ${p.score}pt`;}
    else{const z=p.shita-p.sare; scoreVal=(z>0?'+':'')+z+'pt'; subText=`した ${p.shita}pt / され ${p.sare}pt`;}
    rows.innerHTML+=`
      <div class="rank-row" style="animation-delay:${(sorted.length-rank)*0.25+0.1}s">
        <div class="rbadge ${badge}">${rank}</div>
        <div class="rplayer">
          <div class="rname${isTop?' top':''}">${p.name}${isTop?' 🎉':''}</div>
          <div class="rsub">${subText}</div>
        </div>
        <div class="rscore${isTop?' top':''}">${scoreVal}</div>
      </div>`;
  });
}
function switchRankType(type,btn){
  rankType=type;
  document.querySelectorAll('.rttab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderRanking();
}

// ===== 人物タブ =====
function renderPlayerTabs(){
  const wrap=document.getElementById('playerTabs');
  PLAYERS.forEach((p,i)=>{
    const btn=document.createElement('div');
    btn.className='ptab'+(i===0?' active':'');
    btn.textContent=p.name;
    btn.onclick=()=>{
      document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      currentPlayer=p.id; selectedTarget=null; renderAll();
    };
    wrap.appendChild(btn);
  });
}

// ===== スコア集計 =====
function calcShitaPt(fromId,toId){ return (GUESSES[fromId]?.[toId]||[]).reduce((s,g)=>s+g.pt,0); }
function calcSarePt(subjectId,guesserId){ return (GUESSES[guesserId]?.[subjectId]||[]).reduce((s,g)=>s+g.pt,0); }

// ===== サマリー描画 =====
function renderSummaryShita(){
  const me=PLAYERS.find(p=>p.id===currentPlayer);
  document.getElementById('shita-head').textContent=`${me.name}が各プレイヤーを何点当てたか`;
  const others=PLAYERS.filter(p=>p.id!==currentPlayer)
    .map(p=>({...p,pt:calcShitaPt(currentPlayer,p.id)}))
    .sort((a,b)=>b.pt-a.pt);
  document.getElementById('shita-total').textContent=others.reduce((s,p)=>s+p.pt,0)+'pt';
  const wrap=document.getElementById('shita-rows'); wrap.innerHTML='';
  others.forEach(p=>{
    const row=document.createElement('div');
    row.className='score-row'+(selectedTarget===p.id?' active-row':'');
    row.innerHTML=`<div class="score-row-name">${p.name}</div><div class="score-row-pt">${p.pt}pt</div><div class="score-row-chevron">›</div>`;
    row.onclick=()=>{selectedTarget=p.id;renderAll();};
    wrap.appendChild(row);
  });
}
function renderSummarySare(){
  const me=PLAYERS.find(p=>p.id===currentPlayer);
  document.getElementById('sare-head').textContent=`${me.name}のランキングを各プレイヤーが何点当てたか`;
  const others=PLAYERS.filter(p=>p.id!==currentPlayer)
    .map(p=>({...p,pt:calcSarePt(currentPlayer,p.id)}))
    .sort((a,b)=>b.pt-a.pt);
  document.getElementById('sare-total').textContent=others.reduce((s,p)=>s+p.pt,0)+'pt';
  const wrap=document.getElementById('sare-rows'); wrap.innerHTML='';
  others.forEach(p=>{
    const row=document.createElement('div');
    row.className='score-row'+(selectedTarget===p.id?' active-row':'');
    row.innerHTML=`<div class="score-row-name">${p.name}</div><div class="score-row-pt">${p.pt}pt</div><div class="score-row-chevron">›</div>`;
    row.onclick=()=>{selectedTarget=p.id;renderAll();};
    wrap.appendChild(row);
  });
}

// ===== 詳細：正解した率 =====
function renderDetailShita(){
  const el=document.getElementById('detail-shita');
  if(!selectedTarget){el.innerHTML='<div style="padding:12px 0;font-size:11px;color:var(--text-muted)">上の表から人物を選ぶと詳細が表示されます</div>';return;}
  const target=PLAYERS.find(p=>p.id===selectedTarget);
  const me=PLAYERS.find(p=>p.id===currentPlayer);
  const myGuesses=GUESSES[currentPlayer]?.[selectedTarget]||[];
  const myTotal=myGuesses.reduce((s,g)=>s+g.pt,0);
  const answers=ANSWERS[selectedTarget]||[];
  const otherGuessers=PLAYERS.filter(p=>p.id!==currentPlayer&&p.id!==selectedTarget);
  const otherScores=otherGuessers.map(p=>({name:p.name,pt:calcShitaPt(p.id,selectedTarget)})).sort((a,b)=>b.pt-a.pt);
  const maxPt=Math.max(...otherScores.map(o=>o.pt),myTotal,1);

  let html=`
    <div class="detail-header">
      <div class="detail-who">${target.name}のランキング<br><span>&amp; ${me.name}の予想</span></div>
      <div class="detail-total">${myTotal}pt</div>
    </div>`;

  answers.forEach((ans,i)=>{
    const mine=myGuesses[i]||{guessedRank:'-',result:'miss',pt:0};
    const rankLabel=ordinal(mine.guessedRank);
    const evalLabel=mine.result==='hit'?'あたり':mine.result==='close'?'おしい':'はずれ';
    const ptLabel=`+${mine.pt}pt`;

    // 他者の同ランクへの予想
    const otherRows=otherGuessers.map(op=>{
      // 実データがあれば使う、なければseedベースの疑似データ
      let og=GUESSES[op.id]?.[selectedTarget]?.[i];
      if(!og){
        const seed=(op.id.charCodeAt(0)*7+i*13)%7;
        const r=seed<=1?'hit':seed<=3?'close':'miss';
        const rk=r==='hit'?(i+1):r==='close'?(i+2<=5?i+2:i):(i+3<=5?i+3:1);
        const pt=r==='hit'?2:r==='close'?1:0;
        og={guessedRank:rk,result:r,pt};
      }
      const oRank=ordinal(og.guessedRank);
      const oEval=og.result==='hit'?'あたり':og.result==='close'?'おしい':'はずれ';
      return `<div class="gr">
        <div class="gr-name">${op.name}</div>
        <div class="gr-rank">${oRank}</div>
        <div class="gr-chip ${og.result}">${oEval}</div>
        <div class="gr-pt">+${og.pt}pt</div>
      </div>`;
    }).join('');

    html+=`
      <div class="ri">
        <div class="ri-head" onclick="this.closest('.ri').classList.toggle('open')">
          <div class="ri-num">${ordinal(i+1)}</div>
          <div class="ri-ans">${ans}</div>
          <div class="ri-mine-wrap">
            <div class="ri-rank"style="font-size:9px;font-weight:700;color:var(--text-muted);white-space:nowrap">${rankLabel}</div>
            <div class="ri-chip ${mine.result}">${evalLabel}</div>
            <div class="ri-pt">${ptLabel}</div>
          </div>
          <div class="ri-chv">▼</div>
        </div>
        <div class="ri-body">${otherRows}</div>
      </div>`;
  });

  // 合計行＋比較展開
  const cmpRows=otherScores.map(o=>{
    const w=Math.round((o.pt/maxPt)*100);
    return `<div class="cmp-row"><div class="cmp-name">${o.name}</div><div class="cmp-bar-wrap"><div class="cmp-bar" style="width:${w}%"></div></div><div class="cmp-pt">${o.pt}pt</div></div>`;
  }).join('');
  html+=`
    <div class="detail-total-row" onclick="this.classList.toggle('open');this.nextElementSibling.style.display=this.classList.contains('open')?'block':'none'">
      <div class="detail-total-label">合計</div>
      <div class="detail-total-score">${myTotal}pt</div>
      <div class="detail-total-chv">▼</div>
    </div>
    <div class="detail-total-body" style="display:none">${cmpRows}</div>`;

  el.innerHTML=html;
}

// ===== 詳細：正解され率 =====
function renderDetailSare(){
  const el=document.getElementById('detail-sare');
  if(!selectedTarget){el.innerHTML='<div style="padding:12px 0;font-size:11px;color:var(--text-muted)">上の表から人物を選ぶと詳細が表示されます</div>';return;}
  const guesser=PLAYERS.find(p=>p.id===selectedTarget);
  const me=PLAYERS.find(p=>p.id===currentPlayer);
  const guesses=GUESSES[selectedTarget]?.[currentPlayer]||[];
  const total=guesses.reduce((s,g)=>s+g.pt,0);
  const myAnswers=ANSWERS[currentPlayer]||[];

  let html=`
    <div class="detail-header">
      <div class="detail-who">${guesser.name}の予想<br><span>&amp; ${me.name}のランキング</span></div>
      <div class="detail-total">${total}pt</div>
    </div>`;

  myAnswers.forEach((ans,i)=>{
    const g=guesses[i]||{guessedRank:'-',guessedAns:'（データなし）',result:'miss',pt:0};
    const evalLabel=g.result==='hit'?'あたり +2':g.result==='close'?'おしい +1':'はずれ';
    html+=`
      <div class="sare-ri">
        <div class="sare-num">${ordinal(i+1)}</div>
        <div class="sare-wrap">
          <div class="sare-guess">${g.guessedAns}</div>
          <div class="sare-correct">正解: ${ans}</div>
        </div>
        <div class="sare-chip ${g.result}">${evalLabel}</div>
        <div class="sare-pt">+${g.pt}pt</div>
      </div>`;
  });

  el.innerHTML=html;
}

// ===== 軸切替 =====
function switchAxis(axis,btn){
  currentAxis=axis; selectedTarget=null;
  document.querySelectorAll('.atab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('summary-shita').style.display=axis==='shita'?'block':'none';
  document.getElementById('summary-sare').style.display=axis==='sare'?'block':'none';
  document.getElementById('detail-shita').classList.toggle('active',axis==='shita');
  document.getElementById('detail-sare').classList.toggle('active',axis==='sare');
  renderAll();
}
function renderAll(){
  renderSummaryShita(); renderSummarySare();
  if(currentAxis==='shita') renderDetailShita();
  else renderDetailSare();
}

renderRanking();
renderPlayerTabs();
selectedTarget=PLAYERS.filter(p=>p.id!==currentPlayer)[0].id;
renderAll();
